name: Tests and Coverage
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}
jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    # Set job outputs to values from filter step
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
      - uses: dorny/paths-filter@9af6e5a9d010d1ae8ec570390b3d793e2b70a402
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
  test:
    permissions:
      contents: read
      pull-requests: read
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f

      - name: Install uv
        uses: astral-sh/setup-uv@6a191366842ac1502ba6c07e9b5acd5c2d9d8db3
        with:
          version: "0.11.28"
          python-version: ${{ matrix.python-version }}

      - name: Test with Python ${{ matrix.python-version }}
        run: uv run --frozen pytest --doctest-modules --cov=src --cov-branch --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
